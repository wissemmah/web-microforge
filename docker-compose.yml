services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: microforge
      POSTGRES_PASSWORD: microforge
      POSTGRES_DB: microforge
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U microforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: microforge
      DB_PASSWORD: microforge
      DB_NAME: microforge
      DB_SYNC: "true"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-openssl-rand}
      CORS_ORIGIN: http://localhost:8080
      ARTIFACT_STORAGE_PATH: /app/storage
      PORT: 3000
    volumes:
      - artifact_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
  artifact_storage:
